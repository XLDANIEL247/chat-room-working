<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chatroom</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Chatroom</h1>
      <p>Join a room, chat, and share your screen.</p>
    </header>

    <section class="panel">
      <div class="row">
        <input id="nameInput" placeholder="Your name" />
        <input id="roomInput" placeholder="Room code" />
        <button id="joinBtn">Join Room</button>
      </div>

      <div class="row">
        <button id="shareBtn" disabled>Share Screen</button>
        <button id="leaveBtn" disabled>Leave Room</button>
      </div>
    </section>

    <section class="main">
      <div class="videoBox">
        <h2>Screen Share</h2>
        <video id="screenVideo" autoplay playsinline muted></video>
      </div>

      <div class="chatBox">
        <h2>Chat</h2>
        <ul id="messages"></ul>
        <form id="chatForm">
          <input id="messageInput" placeholder="Type a message..." disabled />
          <button type="submit" disabled id="sendBtn">Send</button>
        </form>
      </div>
    </section>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
